<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800;900&display=swap" rel="stylesheet">

<title>Join Challenge</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Bricolage Grotesque', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#eaf6fb,#ffffff);
}

.form-box{
  width:100%;
  max-width:400px;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#2daae1;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="form-box">
  <h2>Join The Challenge</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="nation" placeholder="Nationality">
  <input type="file" id="image" accept="image/*">

  <button onclick="submitForm()">Continue</button>
</div>

<script>
function submitForm(){

  const name = document.getElementById("name").value;
  const nation = document.getElementById("nation").value;
  const file = document.getElementById("image").files[0];

  if(!name || !nation || !file){
    alert("Fill all fields");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(){

    const imgData = reader.result;

    // ✅ SAVE TO LOCAL STORAGE
    localStorage.setItem("flyerName", name);
    localStorage.setItem("flyerNation", nation);
    localStorage.setItem("flyerImg", imgData);

    // ✅ SEND EMAIL (WORKING)
    const formData = new FormData();
    formData.append("name", name);
    formData.append("nationality", nation);
    formData.append("message", "New submission");

    formData.append("_captcha", "false");
    formData.append("_template", "table");

    fetch("https://formsubmit.co/ajax/christophercrystal207@gmail.com", {
      method: "POST",
      body: formData
    })
    .then(() => {
      // ✅ wait small before redirect (ensures send completes)
      setTimeout(() => {
        window.location.href = "flyer.html";
      }, 800);
    })
    .catch(() => {
      // still continue even if email fails
      window.location.href = "flyer.html";
    });

  };

  // ✅ THIS MUST BE OUTSIDE reader.onload
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
